<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث المباريات المباشر - جيت هاب</title>
    <style>
        :root {
            --bg-color: #0b0b12;
            --card-bg: #13131f;
            --border-color: #1c1c2e;
            --accent-color: #df007a;
            --text-color: #ffffff;
            --time-color: #ff9800;
            --btn-color: #00bcd4;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header-area {
            text-align: center;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        h2 {
            color: var(--time-color);
            margin: 0 0 10px 0;
            font-size: 1.4rem;
        }

        .btn-refresh {
            background: #1c1c2e;
            color: #00bcd4;
            border: 1px solid #00bcd4;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .btn-refresh:hover {
            background: #00bcd4;
            color: #fff;
        }

        .status-message {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-top: 30px;
        }

        .match-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-right: 4px solid var(--accent-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sport-badge {
            display: inline-block;
            font-size: 0.75rem;
            background: rgba(0, 188, 212, 0.15);
            color: var(--btn-color);
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .teams-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 1.05rem;
            margin-bottom: 12px;
        }

        .team {
            width: 40%;
        }

        .team.home { text-align: right; }
        .team.away { text-align: left; }

        .score-badge {
            color: var(--text-color);
            background: var(--border-color);
            padding: 4px 14px;
            border-radius: 4px;
            font-weight: 800;
            min-width: 60px;
            text-align: center;
            font-size: 1.2rem;
            border: 1px solid #31314d;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            margin-top: 10px;
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
        }

        .match-time {
            color: var(--time-color);
            font-weight: bold;
            background: rgba(255, 152, 0, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
        }

        .btn-stream {
            background: var(--btn-color);
            color: #fff;
            padding: 6px 14px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-stream:hover {
            background: #0097a7;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-area">
            <h2>⚽ جدول المباريات والبث المباشر (GitHub)</h2>
            <button class="btn-refresh" onclick="fetchMatchesData()">🔄 تحديث فوري للبيانات</button>
        </div>
        
        <div id="matches-list">
            <div class="status-message">⏳ جاري جلب المباريات الحية من جيت هاب...</div>
        </div>
    </div>

    <script>
        // رابط الجيت هاب الخام الخاص بك والذي يستخرج إليه السكربت
        const githubJsonUrl = "https://raw.githubusercontent.com/rnrnrnbfbrnrnr-commits/Bfbdkkf/refs/heads/main/matches.json";

        // دالة جلب وقراءة الـ JSON
        async function fetchMatchesData() {
            const listContainer = document.getElementById('matches-list');
            
            try {
                // إضافة كلمة عشوائية بنهاية الرابط (Cache Buster) لمنع المتصفح من كاش الرابط القديم وقراءة البيانات القديمة
                const response = await fetch(`${githubJsonUrl}?t=${new Date().getTime()}`);
                
                if (!response.ok) {
                    throw new Error("فشل في الوصول لملف جيت هاب");
                }
                
                const matches = await response.json();
                
                if (!matches || matches.length === 0) {
                    listContainer.innerHTML = '<div class="status-message">📭 لا توجد مباريات جارية حالياً في الملف.</div>';
                    return;
                }

                let html = '';
                matches.forEach(m => {
                    const displayScore = m.score ? m.score.replace('-', ' - ') : "0 - 0";
                    // أيقونة ديناميكية حسب نوع الرياضة المكتوبة بالـ JSON
                    const sportIcon = m.sport === "volleyball" ? "🏐" : "⚽";
                    const sportText = m.sport === "volleyball" ? "كرة طائرة" : "كرة قدم";

                    html += `
                        <div class="match-card">
                            <span class="sport-badge">${sportIcon} ${sportText}</span>
                            <div class="teams-container">
                                <span class="team home">${m.home_team}</span>
                                <span class="score-badge">${displayScore}</span>
                                <span class="team away">${m.away_team}</span>
                            </div>
                            <div class="card-footer">
                                <span class="match-time">⏱️ الدقيقة: ${m.time_minutes}'</span>
                                <a href="${m.stream_url}" target="_blank" class="btn-stream">مشاهدة البث 🔗</a>
                            </div>
                        </div>
                    `;
                });

                listContainer.innerHTML = html;

            } catch (error) {
                console.error("خطأ جلب البيانات:", error);
                listContainer.innerHTML = `<div class="status-message" style="color:#df007a;">❌ خطأ في تحميل البيانات من جيت هاب أو الملف غير موجود بعد!</div>`;
            }
        }

        // تشغيل الجلب التلقائي فور فتح الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            fetchMatchesData();
            
            // تحديث ذكي وتلقائي للجدول كل 60 ثانية بالخلفية لملائمة أهداف المباشر والدقائق
            setInterval(fetchMatchesData, 60000);
        });
    </script>
</body>
</html>
