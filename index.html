<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportPlus - المباريات الحية والقادمة</title>
    <style>
        :root {
            --bein-purple: #4c1255;
            --bein-purple-dark: #2c0533;
            --bein-accent: #ff007f;
            --bg-main: #0c0810;
            --bg-card: #18121e;
            --bg-card-hover: #211929;
            --text-primary: #ffffff;
            --text-secondary: #b0a5b7;
            --live-red: #ff0033;
            --countdown-orange: #f59e0b;
            --border-line: #291d30;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 8px;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 12px;
            padding: 12px;
            background: linear-gradient(135deg, var(--bein-purple), var(--bein-purple-dark));
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header h1 {
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .header h1 span {
            background: var(--bein-accent);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 800;
        }

        .matches-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .status-msg {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 10px;
            font-size: 0.85rem;
        }

        .match-card {
            background: var(--bg-card);
            border: 1px solid var(--border-line);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .match-top-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            margin-bottom: 8px;
        }

        .sport-badge {
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
            max-width: 70%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .time-badge {
            background: var(--bein-purple);
            color: white;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }

        .time-badge.live {
            background: var(--live-red);
            animation: blink-live 1.5s infinite;
        }

        @keyframes blink-live {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .match-body {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
        }

        .team-side {
            width: 38%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .logo-wrapper {
            width: 46px;
            height: 46px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 5px;
        }

        .logo-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .team-name {
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--text-primary);
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .score-center {
            width: 24%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .score-display {
            background: var(--bein-purple-dark);
            color: var(--text-secondary);
            font-size: 1.15rem;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            letter-spacing: 1px;
            text-align: center;
        }

        .score-display.live-score {
            background: var(--bein-purple);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.08);
        }

        .countdown-text {
            font-size: 0.68rem;
            color: var(--countdown-orange);
            margin-top: 6px;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
        }

        .countdown-text.live-now {
            color: var(--bein-accent);
        }

        .btn-action-wrapper {
            margin-top: 10px;
        }

        .btn-stream {
            background: linear-gradient(135deg, var(--bein-purple), #5e1869);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-stream:active {
            background: var(--bein-accent);
            border-color: var(--bein-accent);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Sport <span>Plus</span></h1>
        </div>
        
        <div id="matches-container" class="matches-grid">
            <div class="status-msg">⏳ جاري جلب قائمة مبارياتك الحقيقية من المستودع...</div>
        </div>
    </div>

    <script>
        const rawJsonUrl = "https://raw.githubusercontent.com/rnrnrnbfbrnrnr-commits/Fnkfkfkfk/main/Matches.json";
        let fetchedMatches = [];

        // تحويل تاريخ ووقت الـ JSON إلى طابع زمني دقيق في صيغة تتبع التوقيت العالمي (GMT/UTC)
        function parseGMTTarget(dateStr, timeStr) {
            const currentYear = 2026; 
            
            let day = 6, month = 7; 
            if (dateStr && dateStr.includes('.')) {
                [day, month] = dateStr.split('.').map(Number);
            }
            
            let hours = 0, minutes = 0;
            if (timeStr && timeStr.includes(':')) {
                [hours, minutes] = timeStr.split(':').map(Number);
            }
            
            return Date.UTC(currentYear, month - 1, day, hours, minutes, 0);
        }

        async function loadMatchesData() {
            try {
                const finalFetchUrl = `${rawJsonUrl}?nocache=${new Date().getTime()}`;
                const response = await fetch(finalFetchUrl);
                if (!response.ok) throw new Error("فشل الاتصال بملف السيرفر");
                
                fetchedMatches = await response.json();
                renderLiveDashboard();
            } catch (err) {
                console.error(err);
                document.getElementById('matches-container').innerHTML = 
                    `<div class="status-msg" style="color:var(--bein-accent);">❌ فشل جلب البيانات من ملف الـ JSON الخاص بك. تأكد من رفعه بشكل صحيح وبصيغة سليمة.</div>`;
            }
        }

        function renderLiveDashboard() {
            const container = document.getElementById('matches-container');
            if (!fetchedMatches || fetchedMatches.length === 0) {
                container.innerHTML = '<div class="status-msg">📭 لا توجد مباريات مدرجة داخل الملف حالياً.</div>';
                return;
            }

            // جلب التوقيت العالمي (GMT) الحالي من جهاز المستخدم بدقة متناهية
            const now = new Date();
            const nowGMTTimestamp = Date.UTC(
                now.getUTCFullYear(),
                now.getUTCMonth(),
                now.getUTCDate(),
                now.getUTCHours(),
                now.getUTCMinutes(),
                now.getUTCSeconds()
            );

            let cardsHtml = '';

            fetchedMatches.forEach((match) => {
                if (!match.sport || !match.home_team) return;

                const matchDate = match.date;
                const matchTime = match.time;

                const targetGMTTimestamp = parseGMTTarget(matchDate, matchTime);
                
                // تم إنقاص ساعة كاملة (3,600,000 مللي ثانية) لتتوافق مع توقيت الموقع الحقيقي الفعلي
                const timeDifference = (targetGMTTimestamp - nowGMTTimestamp) - 3600000;

                // إذا انتهى الوقت أو حان موعد المباراة تصبح مباشرة
                let isLive = timeDifference <= 0;
                
                let statusBadge = `مجدولة • ${matchTime || '--:--'} GMT`;
                let scoreText = "VS";
                let countdownOutput = "";
                let badgeClass = "time-badge";
                let scoreClass = "score-display";

                if (isLive) {
                    statusBadge = "LIVE";
                    scoreText = (match.score === "VS" || !match.score) ? "0 - 0" : match.score.replace('-', ' - ');
                    countdownOutput = `<span class="countdown-text live-now">بدأت الآن 🏁</span>`;
                    badgeClass = "time-badge live";
                    scoreClass = "score-display live-score";
                } else {
                    // حساب الساعات والدقائق فقط (مع تدوير الدقائق لأسفل، وحذف الثواني تماماً)
                    const totalMinutes = Math.floor(timeDifference / 60000);
                    const hours = Math.floor(totalMinutes / 60);
                    const minutes = totalMinutes % 60;

                    let timeString = "";
                    if (hours > 0) timeString += `${hours}س `;
                    if (minutes > 0 || hours === 0) timeString += `${minutes}د`;

                    countdownOutput = `<span class="countdown-text">متبقي: ${timeString}</span>`;
                }

                let sportIcon = "⚽";
                let sportName = match.tournament || "كرة القدم";
                
                if (match.sport === "tennis") {
                    sportIcon = "🎾";
                    sportName = match.tournament || "كرة المضرب";
                } else if (match.sport === "basketball") {
                    sportIcon = "🏀";
                    sportName = match.tournament || "كرة السلة";
                }

                const homeLogoUrl = match.home_logo || "https://placehold.co/50x50/18121e/ffffff?text=VS";
                const awayLogoUrl = match.away_logo || "https://placehold.co/50x50/18121e/ffffff?text=VS";

                cardsHtml += `
                    <div class="match-card">
                        <div class="match-top-info">
                            <span class="sport-badge" title="${sportName}">${sportIcon} ${sportName}</span>
                            <span class="${badgeClass}">${statusBadge}</span>
                        </div>
                        <div class="match-body">
                            <div class="team-side">
                                <div class="logo-wrapper">
                                    <img src="${homeLogoUrl}" alt="${match.home_team || 'Home'}" onerror="this.src='https://placehold.co/50x50/18121e/ffffff?text=?';">
                                </div>
                                <div class="team-name" title="${match.home_team}">${match.home_team || 'غير معروف'}</div>
                            </div>
                            
                            <div class="score-center">
                                <div class="${scoreClass}">${scoreText}</div>
                                ${countdownOutput}
                            </div>
                            
                            <div class="team-side">
                                <div class="logo-wrapper">
                                    <img src="${awayLogoUrl}" alt="${match.away_team || 'Away'}" onerror="this.src='https://placehold.co/50x50/18121e/ffffff?text=?';">
                                </div>
                                <div class="team-name" title="${match.away_team}">${match.away_team || 'غير معروف'}</div>
                            </div>
                        </div>
                        <div class="btn-action-wrapper">
                            <a href="${match.stream_url || '#'}" target="_blank" class="btn-stream">مشاهدة البث المباشر ⚡</a>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = cardsHtml;
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadMatchesData();
            
            // تحديث الواجهة والعد التنازلي كل ثانية لمواكبة الوقت الفعلي، لكن العرض يقتصر على الدقائق والساعات
            setInterval(renderLiveDashboard, 1000);
            
            // جلب البيانات مجدداً من ملف الـ JSON كل 30 ثانية لتحديث النتائج
            setInterval(loadMatchesData, 30000);
        });
    </script>
</body>
</html>
