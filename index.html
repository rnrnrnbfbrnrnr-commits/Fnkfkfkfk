<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>TrueGoals IPTV Pro</title>
    <style>
        body { margin:0; background:#0c0813; font-family:Tahoma; color:#fff; overflow:hidden; display:flex; height:100vh; }
        #player-side { flex:1; background:#000; }
        #side-panel { width:320px; background:#1a1033; display:flex; flex-direction:column; border-left:2px solid #7c2ae8; padding:10px; }
        #channel-list { flex:1; overflow-y:auto; margin-top:10px; }
        .ch-btn { display:block; width:100%; margin-bottom:5px; padding:10px; background:#2e1065; color:#fff; border:1px solid #7c2ae8; border-radius:5px; cursor:pointer; font-size:12px; text-align:left; }
        .ch-btn:hover { background:#7c2ae8; }
        input { width:100%; padding:10px; background:#000; color:#fff; border:1px solid #7c2ae8; border-radius:5px; box-sizing:border-box; }
    </style>
</head>
<body>
    <div id="player-side">
        <iframe id="main-player" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
    </div>
    <div id="side-panel">
        <h3 style="color:#00ffcc; text-align:center;">🎮 TrueGoals IPTV</h3>
        <input type="text" id="search" placeholder="🔍 بحث عن قناة...">
        <div id="channel-list"></div>
    </div>

    <script>
        const GITHUB_URL = "https://raw.githubusercontent.com/rnrnrnbfbrnrnr-commits/Fnkfkfkfk/refs/heads/main/Kekfkfndn";
        let allChannels = [];

        async function load() {
            const res = await fetch(GITHUB_URL);
            const text = await res.text();
            text.split('\n').forEach(line => {
                const match = line.match(/الاسم:\s*(.+)\s*\|\s*ID:\s*(\d+)/i);
                if (match) allChannels.push({ name: match[1].trim(), id: match[2].trim() });
            });
            render(allChannels);
        }

        function render(list) {
            const container = document.getElementById('channel-list');
            container.innerHTML = '';
            list.forEach(ch => {
                const btn = document.createElement('button');
                btn.className = 'ch-btn';
                btn.innerText = ch.name;
                btn.onclick = () => document.getElementById('main-player').src = `https://dlhd.st/stream/stream-${ch.id}.php`;
                container.appendChild(btn);
            });
        }

        document.getElementById('search').oninput = (e) => {
            render(allChannels.filter(ch => ch.name.toLowerCase().includes(e.target.value.toLowerCase())));
        };

        load();
    </script>
</body>
</html>
