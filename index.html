<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SportPlus - بوابة المشاهدة</title>
    <!-- استدعاء خطوط Google Font الاحترافية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- استدعاء مكتبة الأيقونات FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* منع التمرير نهائياً وضبط الحجم على مقاس الشاشة بالضبط */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden; /* يمنع الـ Scroll تماماً */
            position: relative;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            /* اللون البنفسجي الموحد لـ beIN SPORTS المأخوذ من صورتك */
            background: #54158C;
            background: linear-gradient(135deg, #611b8a 0%, #3d0d66 100%);
            font-family: 'Cairo', 'Poppins', sans-serif;
        }

        /* خلفية ناعمة جداً لمنع أي تشتيت وللتركيز على المحتوى */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.03) 0%, transparent 80%);
            z-index: 0;
            pointer-events: none;
        }

        /* حاوية التصميم الرئيسية للـموبايل */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 360px; 
            width: 90%;
            padding: 20px;
            box-sizing: border-box;
            animation: fadeIn 0.8s ease-out;
        }

        /* حاوية الشعار المصممة بدقة لتطابق برواز beIN SPORTS في صورتك */
        .logo-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 2.5px solid #ffffff;
            border-radius: 12px;
            padding: 6px 20px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.05);
        }

        .logo-text {
            font-family: 'Poppins', sans-serif;
            font-size: 1.9rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* الخط الفاصل داخل الشعار */
        .logo-divider {
            width: 2.5px;
            height: 25px;
            background-color: #ffffff;
            opacity: 0.8;
        }

        .logo-text span {
            font-weight: 400; /* جعل كلمة Plus أنحف لمحاكاة تصميم الشعار */
            font-style: italic;
        }

        /* السلوجان أسفل الشعار تماماً كما في الصورة */
        .slogan {
            font-family: 'Poppins', 'Cairo', sans-serif;
            color: #ffffff;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 35px;
            opacity: 0.9;
            text-transform: uppercase;
        }

        /* شبكة أيقونات تحاكي شعارات البطولات الموجودة في صورتك */
        .tournaments-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 35px;
            padding: 0 10px;
        }

        .tournament-item {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-size: 1.4rem;
            transition: transform 0.2s;
        }

        .tournament-item span {
            font-size: 0.55rem;
            margin-top: 5px;
            font-weight: bold;
            opacity: 0.8;
        }

        /* زر الدخول بلون أبيض ناصع وخط بنفسجي متباين وفخم */
        .btn-entry {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 20px;
            font-size: 1.15rem;
            font-weight: bold;
            color: #54158C; /* لون النص بنفسجي متناسق مع الخلفية */
            background-color: #ffffff;
            border: none;
            border-radius: 16px;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
            transition: all 0.3s ease;
            cursor: pointer;
            box-sizing: border-box;
        }

        .btn-entry:active {
            transform: scale(0.97);
            background-color: #f3e8ff;
        }

        .btn-entry i {
            font-size: 1.1rem;
            transition: transform 0.3s ease;
        }

        .btn-entry:hover i {
            transform: translateX(-5px);
        }

        /* تذييل الصفحة بسيط وحصري */
        .footer-text {
            margin-top: 30px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.5px;
        }

        /* كود لإخفاء العداد تماماً من التصميم مع استمرار عمله */
        .hidden-counter {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            position: absolute !important;
            width: 0 !important;
            height: 0 !important;
            overflow: hidden !important;
        }

        /* أنميشن ظهور سلس للواجهة عند الفتح */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- برواز الشعار المستوحى من الصورة -->
        <div class="logo-container">
            <div class="logo-text">
                PLUS <div class="logo-divider"></div> <span>SPORT</span>
            </div>
        </div>

        <!-- السلوجان الرسمي بنفس نمط الصورة -->
        <div class="slogan">LE PLUS GRAND DES SPECTACLES</div>

        <!-- شبكة محاكاة للبطولات العالمية (شامبيونزليج، لاليجا، كأس العالم، التنس وغيرها) -->
        <div class="tournaments-grid">
            <div class="tournament-item">
                <i class="fa-solid fa-trophy"></i>
                <span>كأس العالم</span>
            </div>
            <div class="tournament-item">
                <i class="fa-solid fa-circle-notch"></i>
                <span>أبطال أوروبا</span>
            </div>
            <div class="tournament-item">
                <i class="fa-solid fa-shield-halved"></i>
                <span>الدوري الإسباني</span>
            </div>
            <div class="tournament-item">
                <i class="fa-solid fa-baseball"></i>
                <span>التنس</span>
            </div>
        </div>

        <!-- زر الدخول المباشر المتباين والأنيق -->
        <a href="http://fctv33hd.surf/" class="btn-entry">
            <span>دخول المنصة الآن</span>
            <i class="fa-solid fa-arrow-left"></i>
        </a>

        <!-- حقوق النشر -->
        <div class="footer-text">
            &copy; 2026 SportPlus. جميع الحقوق محفوظة.
        </div>
    </div>

    <!-- كود العداد مخفي تماماً في الخلفية ومحمي من الظهور -->
    <div class="hidden-counter">
        <a href="https://www.flagcounter.me/details/hDl"><img src="https://www.flagcounter.me/hDl/" alt="Flag Counter"></a>
    </div>

</body>
</html>
